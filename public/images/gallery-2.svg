<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tablebg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#tablebg)"/>

  <!-- Wooden table surface -->
  <rect x="0" y="180" width="400" height="220" fill="#d6d3d1"/>
  <rect x="0" y="180" width="400" height="5" fill="#a8a29e" opacity="0.5"/>
  <!-- Wood grain -->
  <line x1="0" y1="220" x2="400" y2="225" stroke="#c4b5a3" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="280" x2="400" y2="278" stroke="#c4b5a3" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="340" x2="400" y2="342" stroke="#c4b5a3" stroke-width="0.5" opacity="0.3"/>

  <!-- Coffee cup - ceramic -->
  <g transform="translate(150, 200)">
    <ellipse cx="50" cy="100" rx="55" ry="8" fill="#00000010"/>
    <rect x="5" y="20" width="90" height="80" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <ellipse cx="50" cy="20" rx="45" ry="15" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <ellipse cx="50" cy="25" rx="35" ry="10" fill="#78350f" opacity="0.25"/>
    <!-- Latte art -->
    <ellipse cx="50" cy="27" rx="15" ry="6" fill="#fef3c7" opacity="0.5"/>
    <path d="M42 27 Q50 20 58 27" stroke="#fef3c7" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Handle -->
    <path d="M95 40 Q115 40 115 60 Q115 80 95 80" stroke="#e5e7eb" stroke-width="4" fill="none"/>
    <!-- Steam -->
    <path d="M35 10 Q30 -5 38 -15" stroke="#d6d3d1" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M50 8 Q45 -8 53 -18" stroke="#d6d3d1" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M65 10 Q60 -5 68 -15" stroke="#d6d3d1" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Notebook -->
  <g transform="translate(20, 220) rotate(-8)">
    <rect x="0" y="0" width="110" height="140" rx="4" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1"/>
    <rect x="0" y="0" width="15" height="140" rx="4" fill="#e7e5e4"/>
    <!-- Lines -->
    <line x1="25" y1="25" x2="100" y2="25" stroke="#d6d3d1" stroke-width="0.5"/>
    <line x1="25" y1="40" x2="90" y2="40" stroke="#d6d3d1" stroke-width="0.5"/>
    <line x1="25" y1="55" x2="95" y2="55" stroke="#d6d3d1" stroke-width="0.5"/>
    <line x1="25" y1="70" x2="80" y2="70" stroke="#d6d3d1" stroke-width="0.5"/>
    <!-- Pen scribbles -->
    <path d="M28 22 L70 22" stroke="#1a1a2e" stroke-width="0.8" opacity="0.3"/>
    <path d="M28 37 L55 37" stroke="#1a1a2e" stroke-width="0.8" opacity="0.25"/>
    <path d="M28 52 L80 52" stroke="#10b981" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Pen -->
  <g transform="translate(290, 230) rotate(25)">
    <rect x="0" y="0" width="8" height="100" rx="2" fill="#1a1a2e" opacity="0.7"/>
    <rect x="1" y="0" width="6" height="15" rx="1" fill="#d4d4d8"/>
    <polygon points="2,100 6,100 4,110" fill="#d4d4d8"/>
  </g>

  <!-- Small succulent plant -->
  <g transform="translate(310, 180)">
    <rect x="10" y="30" width="40" height="35" rx="4" fill="#a16207" opacity="0.25"/>
    <ellipse cx="30" cy="25" rx="22" ry="18" fill="#22c55e" opacity="0.4"/>
    <ellipse cx="22" cy="18" rx="10" ry="14" fill="#16a34a" opacity="0.35"/>
    <ellipse cx="38" cy="20" rx="12" ry="12" fill="#15803d" opacity="0.3"/>
  </g>

  <!-- Warm light from window -->
  <rect x="0" y="0" width="400" height="180" fill="url(#tablebg)" opacity="0.3"/>
</svg>
