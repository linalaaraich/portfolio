<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="40%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="hh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="hshirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="400" height="520" fill="url(#hbg)"/>

  <!-- Decorative bg circles -->
  <circle cx="320" cy="80" r="60" fill="#6ee7b7" opacity="0.15"/>
  <circle cx="60" cy="420" r="45" fill="#34d399" opacity="0.1"/>
  <circle cx="350" cy="350" r="30" fill="#10b981" opacity="0.08"/>

  <!-- Decorative plants -->
  <g opacity="0.15" fill="#059669">
    <ellipse cx="50" cy="500" rx="30" ry="60"/>
    <ellipse cx="75" cy="490" rx="25" ry="50" transform="rotate(15 75 490)"/>
    <ellipse cx="350" cy="510" rx="35" ry="55" transform="rotate(-10 350 510)"/>
  </g>

  <!-- Body / Shoulders -->
  <ellipse cx="200" cy="540" rx="120" ry="80" fill="url(#hshirt)"/>

  <!-- Neck -->
  <rect x="180" y="370" width="40" height="40" rx="10" fill="#d4a574"/>

  <!-- Face -->
  <ellipse cx="200" cy="290" rx="65" ry="78" fill="#deb887"/>

  <!-- Hair back volume -->
  <ellipse cx="200" cy="240" rx="80" ry="65" fill="url(#hh)"/>

  <!-- Hair front/bangs -->
  <path d="M125 260 C125 200, 175 175, 200 188 C225 175, 275 200, 275 260 C275 230, 245 210, 200 215 C155 210, 125 230, 125 260Z" fill="url(#hh)"/>

  <!-- Hair flowing sides -->
  <ellipse cx="128" cy="300" rx="18" ry="55" fill="url(#hh)"/>
  <ellipse cx="272" cy="300" rx="18" ry="55" fill="url(#hh)"/>
  <!-- Hair bottom -->
  <ellipse cx="145" cy="360" rx="14" ry="30" fill="url(#hh)"/>
  <ellipse cx="255" cy="360" rx="14" ry="30" fill="url(#hh)"/>

  <!-- Eyebrows -->
  <path d="M160 268 Q172 262 186 268" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M214 268 Q228 262 240 268" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="173" cy="285" rx="9" ry="8" fill="#1a1a2e"/>
  <ellipse cx="227" cy="285" rx="9" ry="8" fill="#1a1a2e"/>
  <!-- Eye highlights -->
  <circle cx="176" cy="282" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="230" cy="282" r="2.5" fill="white" opacity="0.85"/>
  <!-- Lower eyelash hints -->
  <path d="M164 290 Q173 294 182 290" stroke="#c49a6c" stroke-width="0.8" fill="none"/>
  <path d="M218 290 Q227 294 236 290" stroke="#c49a6c" stroke-width="0.8" fill="none"/>

  <!-- Nose -->
  <path d="M196 305 Q200 315 204 305" stroke="#c49a6c" stroke-width="1.5" fill="none"/>

  <!-- Smile -->
  <path d="M178 322 Q200 340 222 322" stroke="#b5835a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <circle cx="155" cy="310" r="12" fill="#e8a0a0" opacity="0.18"/>
  <circle cx="245" cy="310" r="12" fill="#e8a0a0" opacity="0.18"/>

  <!-- Shirt neckline -->
  <path d="M160 400 Q200 430 240 400" stroke="#053e2e" stroke-width="2" fill="none"/>

  <!-- Sparkle decorations -->
  <g fill="#10b981" opacity="0.4">
    <polygon points="310,150 313,142 316,150 313,158"/>
    <polygon points="307,150 313,147 319,150 313,153"/>

    <polygon points="80,200 83,192 86,200 83,208"/>
    <polygon points="77,200 83,197 89,200 83,203"/>

    <polygon points="330,280 332,274 334,280 332,286"/>
    <polygon points="328,280 332,278 336,280 332,282"/>
  </g>

  <!-- Small floating dots -->
  <circle cx="100" cy="120" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="320" cy="200" r="2" fill="#6ee7b7" opacity="0.25"/>
  <circle cx="80" cy="340" r="2.5" fill="#059669" opacity="0.2"/>
</svg>
