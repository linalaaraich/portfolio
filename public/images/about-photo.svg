<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="ah" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="asweater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="320" height="440" fill="url(#abg)"/>

  <!-- Desk/table -->
  <rect x="0" y="340" width="320" height="100" fill="#d6d3d1" rx="0"/>
  <rect x="0" y="335" width="320" height="10" fill="#a8a29e" rx="2"/>

  <!-- Laptop -->
  <g transform="translate(80, 300)">
    <rect x="0" y="25" width="160" height="10" rx="2" fill="#a1a1aa"/>
    <rect x="10" y="0" width="140" height="28" rx="3" fill="#27272a"/>
    <rect x="15" y="3" width="130" height="22" rx="2" fill="#10b981" opacity="0.3"/>
    <!-- Code lines on screen -->
    <rect x="22" y="7" width="50" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="22" y="12" width="70" height="2" rx="1" fill="white" opacity="0.3"/>
    <rect x="22" y="17" width="40" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="30" y="17" width="30" height="2" rx="1" fill="#6ee7b7" opacity="0.6"/>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(250, 310)">
    <rect x="0" y="10" width="30" height="25" rx="4" fill="white" stroke="#d6d3d1" stroke-width="1"/>
    <ellipse cx="15" cy="10" rx="15" ry="4" fill="white" stroke="#d6d3d1" stroke-width="1"/>
    <ellipse cx="15" cy="12" rx="10" ry="3" fill="#92400e" opacity="0.3"/>
    <!-- Handle -->
    <path d="M30 17 Q40 17 40 25 Q40 33 30 33" stroke="#d6d3d1" stroke-width="1.5" fill="none"/>
    <!-- Steam -->
    <path d="M10 5 Q8 -2 12 -5" stroke="#d6d3d1" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M18 3 Q16 -4 20 -7" stroke="#d6d3d1" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Body/Shoulders -->
  <ellipse cx="160" cy="430" rx="100" ry="65" fill="url(#asweater)"/>

  <!-- Neck -->
  <rect x="143" y="290" width="34" height="35" rx="8" fill="#d4a574"/>

  <!-- Face -->
  <ellipse cx="160" cy="220" rx="55" ry="68" fill="#deb887"/>

  <!-- Hair -->
  <ellipse cx="160" cy="175" rx="68" ry="52" fill="url(#ah)"/>
  <path d="M96 200 C96 155, 135 135, 160 145 C185 135, 224 155, 224 200 C224 180, 200 165, 160 168 C120 165, 96 180, 96 200Z" fill="url(#ah)"/>
  <ellipse cx="100" cy="230" rx="14" ry="45" fill="url(#ah)"/>
  <ellipse cx="220" cy="230" rx="14" ry="45" fill="url(#ah)"/>
  <ellipse cx="110" cy="280" rx="10" ry="25" fill="url(#ah)"/>
  <ellipse cx="210" cy="280" rx="10" ry="25" fill="url(#ah)"/>

  <!-- Eyes (looking down at laptop) -->
  <ellipse cx="142" cy="220" rx="7" ry="5" fill="#1a1a2e"/>
  <ellipse cx="178" cy="220" rx="7" ry="5" fill="#1a1a2e"/>
  <circle cx="144" cy="218" r="2" fill="white" opacity="0.7"/>
  <circle cx="180" cy="218" r="2" fill="white" opacity="0.7"/>

  <!-- Eyebrows -->
  <path d="M130 208 Q142 203 154 208" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M166 208 Q178 203 190 208" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M157 238 Q160 245 163 238" stroke="#c49a6c" stroke-width="1.2" fill="none"/>

  <!-- Gentle smile -->
  <path d="M145 255 Q160 266 175 255" stroke="#b5835a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <circle cx="128" cy="242" r="10" fill="#e8a0a0" opacity="0.15"/>
  <circle cx="192" cy="242" r="10" fill="#e8a0a0" opacity="0.15"/>

  <!-- Plant in corner -->
  <g transform="translate(20, 310)">
    <rect x="5" y="20" width="25" height="30" rx="3" fill="#a16207" opacity="0.3"/>
    <ellipse cx="17" cy="15" rx="18" ry="15" fill="#16a34a" opacity="0.3"/>
    <ellipse cx="10" cy="8" rx="10" ry="12" fill="#22c55e" opacity="0.25"/>
    <ellipse cx="25" cy="10" rx="8" ry="10" fill="#15803d" opacity="0.2"/>
  </g>

  <!-- Sparkles -->
  <circle cx="50" cy="100" r="2" fill="#34d399" opacity="0.3"/>
  <circle cx="280" cy="80" r="3" fill="#6ee7b7" opacity="0.25"/>
  <circle cx="270" cy="180" r="2" fill="#10b981" opacity="0.2"/>
</svg>
