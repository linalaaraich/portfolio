    <circle cx="18" cy="0" r="5" fill="#34d399"/>
    <circle cx="36" cy="0" r="5" fill="#10b981"/>
  </g>
  <!-- Decorative -->
  <circle cx="520" cy="240" r="30" fill="#6ee7b7" opacity="0.05"/>
</svg>
