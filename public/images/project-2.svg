<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#g2)"/>
  <!-- Chat bubbles -->
  <g opacity="0.9">
    <rect x="40" y="40" width="250" height="50" rx="25" fill="white" opacity="0.08"/>
    <rect x="55" y="57" width="120" height="6" rx="3" fill="white" opacity="0.12"/>
    <rect x="55" y="68" width="80" height="6" rx="3" fill="white" opacity="0.08"/>

    <rect x="310" y="110" width="250" height="50" rx="25" fill="#059669" opacity="0.2"/>
    <rect x="325" y="127" width="140" height="6" rx="3" fill="white" opacity="0.15"/>
    <rect x="325" y="138" width="90" height="6" rx="3" fill="white" opacity="0.1"/>

    <rect x="40" y="180" width="300" height="50" rx="25" fill="white" opacity="0.08"/>
    <rect x="55" y="197" width="160" height="6" rx="3" fill="white" opacity="0.12"/>
    <rect x="55" y="208" width="100" height="6" rx="3" fill="white" opacity="0.08"/>
  </g>
  <!-- AI sparkle -->
  <g transform="translate(500, 60)" fill="#34d399" opacity="0.3">
