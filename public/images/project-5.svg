<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#g5)"/>
  <!-- Analytics chart -->
  <g opacity="0.9">
    <!-- Grid lines -->
    <line x1="60" y1="60" x2="60" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="60" y1="250" x2="550" y2="250" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="60" y1="200" x2="550" y2="200" stroke="white" stroke-opacity="0.03" stroke-dasharray="4"/>
    <line x1="60" y1="150" x2="550" y2="150" stroke="white" stroke-opacity="0.03" stroke-dasharray="4"/>
    <line x1="60" y1="100" x2="550" y2="100" stroke="white" stroke-opacity="0.03" stroke-dasharray="4"/>

    <!-- Area chart -->
    <path d="M60 220 L120 190 L180 200 L240 160 L300 140 L360 100 L420 120 L480 80 L540 90 L540 250 L60 250Z"
      fill="#059669" opacity="0.15"/>
    <path d="M60 220 L120 190 L180 200 L240 160 L300 140 L360 100 L420 120 L480 80 L540 90"
      stroke="#10b981" stroke-width="2.5" fill="none" opacity="0.6"/>

    <!-- Data points -->
    <circle cx="120" cy="190" r="4" fill="#34d399" opacity="0.5"/>
    <circle cx="240" cy="160" r="4" fill="#34d399" opacity="0.5"/>
    <circle cx="360" cy="100" r="5" fill="#34d399" opacity="0.7"/>
    <circle cx="480" cy="80" r="4" fill="#34d399" opacity="0.5"/>

    <!-- Bar chart overlay -->
    <rect x="90" y="210" width="20" height="40" rx="3" fill="#6ee7b7" opacity="0.12"/>
    <rect x="150" y="195" width="20" height="55" rx="3" fill="#6ee7b7" opacity="0.12"/>
    <rect x="210" y="180" width="20" height="70" rx="3" fill="#6ee7b7" opacity="0.12"/>
    <rect x="270" y="165" width="20" height="85" rx="3" fill="#6ee7b7" opacity="0.15"/>
    <rect x="330" y="145" width="20" height="105" rx="3" fill="#6ee7b7" opacity="0.15"/>
    <rect x="390" y="155" width="20" height="95" rx="3" fill="#6ee7b7" opacity="0.12"/>
    <rect x="450" y="130" width="20" height="120" rx="3" fill="#6ee7b7" opacity="0.18"/>
    <rect x="510" y="140" width="20" height="110" rx="3" fill="#6ee7b7" opacity="0.15"/>
  </g>
  <!-- Stats cards -->
  <rect x="70" y="40" width="80" height="35" rx="6" fill="white" opacity="0.06"/>
  <rect x="80" y="48" width="30" height="6" rx="3" fill="white" opacity="0.1"/>
  <rect x="80" y="60" width="50" height="8" rx="4" fill="#34d399" opacity="0.3"/>
</svg>
