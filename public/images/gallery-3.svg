<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#wbg)"/>

  <!-- Desk -->
  <rect x="0" y="200" width="400" height="200" fill="#fef3c7" opacity="0.4"/>
  <rect x="0" y="195" width="400" height="8" fill="#d6d3d1" rx="2"/>

  <!-- Monitor -->
  <g transform="translate(100, 30)">
    <rect x="0" y="0" width="200" height="130" rx="8" fill="#27272a"/>
    <rect x="6" y="6" width="188" height="115" rx="4" fill="#0f172a"/>
    <!-- Code on screen -->
    <rect x="15" y="15" width="40" height="3" rx="1" fill="#818cf8" opacity="0.6"/>
    <rect x="15" y="23" width="80" height="3" rx="1" fill="#34d399" opacity="0.5"/>
    <rect x="25" y="31" width="60" height="3" rx="1" fill="#f9fafb" opacity="0.3"/>
    <rect x="25" y="39" width="90" height="3" rx="1" fill="#fbbf24" opacity="0.4"/>
    <rect x="25" y="47" width="45" height="3" rx="1" fill="#34d399" opacity="0.5"/>
    <rect x="15" y="55" width="70" height="3" rx="1" fill="#818cf8" opacity="0.4"/>
    <rect x="25" y="63" width="100" height="3" rx="1" fill="#f9fafb" opacity="0.25"/>
    <rect x="25" y="71" width="55" height="3" rx="1" fill="#fb923c" opacity="0.4"/>
    <rect x="15" y="79" width="30" height="3" rx="1" fill="#818cf8" opacity="0.5"/>
    <rect x="15" y="87" width="80" height="3" rx="1" fill="#f9fafb" opacity="0.2"/>
    <rect x="15" y="95" width="60" height="3" rx="1" fill="#34d399" opacity="0.4"/>
    <!-- Line numbers -->
    <rect x="8" y="15" width="4" height="83" fill="#475569" opacity="0.15"/>
    <!-- Monitor stand -->
    <rect x="85" y="130" width="30" height="30" rx="2" fill="#a1a1aa"/>
    <rect x="60" y="157" width="80" height="5" rx="2" fill="#a1a1aa"/>
  </g>

  <!-- Keyboard -->
  <g transform="translate(110, 220)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#e5e7eb"/>
    <rect x="3" y="3" width="174" height="54" rx="4" fill="#f9fafb"/>
    <!-- Key rows -->
    <g fill="#e5e7eb">
      <rect x="10" y="8" width="12" height="10" rx="2"/>
      <rect x="25" y="8" width="12" height="10" rx="2"/>
      <rect x="40" y="8" width="12" height="10" rx="2"/>
      <rect x="55" y="8" width="12" height="10" rx="2"/>
      <rect x="70" y="8" width="12" height="10" rx="2"/>
      <rect x="85" y="8" width="12" height="10" rx="2"/>
      <rect x="100" y="8" width="12" height="10" rx="2"/>
      <rect x="115" y="8" width="12" height="10" rx="2"/>
      <rect x="130" y="8" width="12" height="10" rx="2"/>
      <rect x="145" y="8" width="12" height="10" rx="2"/>
      <rect x="10" y="22" width="12" height="10" rx="2"/>
      <rect x="25" y="22" width="12" height="10" rx="2"/>
      <rect x="40" y="22" width="12" height="10" rx="2"/>
      <rect x="55" y="22" width="12" height="10" rx="2"/>
      <rect x="70" y="22" width="12" height="10" rx="2"/>
      <rect x="85" y="22" width="12" height="10" rx="2"/>
      <rect x="100" y="22" width="12" height="10" rx="2"/>
      <rect x="115" y="22" width="12" height="10" rx="2"/>
      <rect x="130" y="22" width="12" height="10" rx="2"/>
      <rect x="145" y="22" width="12" height="10" rx="2"/>
      <rect x="45" y="40" width="80" height="10" rx="2"/>
    </g>
  </g>

  <!-- Plant -->
  <g transform="translate(30, 100)">
    <rect x="10" y="60" width="35" height="50" rx="5" fill="#a16207" opacity="0.2"/>
    <ellipse cx="27" cy="50" rx="25" ry="22" fill="#22c55e" opacity="0.35"/>
    <ellipse cx="18" cy="38" rx="14" ry="18" fill="#16a34a" opacity="0.3"/>
    <ellipse cx="35" cy="42" rx="12" ry="15" fill="#15803d" opacity="0.25"/>
  </g>

  <!-- Desk lamp -->
  <g transform="translate(330, 110)">
    <rect x="15" y="80" width="20" height="3" rx="1" fill="#a1a1aa"/>
    <rect x="22" y="40" width="6" height="42" fill="#d4d4d8"/>
    <path d="M10 42 L28 20 L50 42" fill="#fde68a" opacity="0.3"/>
    <ellipse cx="28" cy="20" rx="20" ry="8" fill="#d4d4d8"/>
    <!-- Light glow -->
    <ellipse cx="28" cy="42" rx="18" ry="5" fill="#fde68a" opacity="0.15"/>
  </g>

  <!-- Coffee mug -->
  <g transform="translate(310, 215)">
    <rect x="0" y="8" width="28" height="28" rx="5" fill="white" stroke="#d6d3d1" stroke-width="1"/>
    <ellipse cx="14" cy="8" rx="14" ry="5" fill="white" stroke="#d6d3d1" stroke-width="1"/>
    <ellipse cx="14" cy="10" rx="9" ry="3" fill="#78350f" opacity="0.2"/>
    <path d="M28 15 Q38 15 38 22 Q38 29 28 29" stroke="#d6d3d1" stroke-width="1.5" fill="none"/>
  </g>
</svg>
