<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef7cd"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#mbg)"/>

  <!-- Moroccan geometric pattern -->
  <g stroke="#92400e" stroke-width="1" fill="none" opacity="0.15">
    <!-- Large star pattern grid -->
    <!-- Row 1 -->
    <polygon points="50,50 70,30 90,50 70,70"/>
    <polygon points="150,50 170,30 190,50 170,70"/>
    <polygon points="250,50 270,30 290,50 270,70"/>
    <polygon points="350,50 370,30 390,50 370,70"/>
    <!-- Row 2 -->
    <polygon points="0,150 20,130 40,150 20,170"/>
    <polygon points="100,150 120,130 140,150 120,170"/>
    <polygon points="200,150 220,130 240,150 220,170"/>
    <polygon points="300,150 320,130 340,150 320,170"/>
    <!-- Row 3 -->
    <polygon points="50,250 70,230 90,250 70,270"/>
    <polygon points="150,250 170,230 190,250 170,270"/>
    <polygon points="250,250 270,230 290,250 270,270"/>
    <polygon points="350,250 370,230 390,250 370,270"/>
    <!-- Row 4 -->
    <polygon points="0,350 20,330 40,350 20,370"/>
    <polygon points="100,350 120,330 140,350 120,370"/>
    <polygon points="200,350 220,330 240,350 220,370"/>
    <polygon points="300,350 320,330 340,350 320,370"/>
  </g>

  <!-- Connecting lines -->
  <g stroke="#92400e" stroke-width="0.5" opacity="0.1">
    <line x1="70" y1="70" x2="120" y2="130"/>
    <line x1="170" y1="70" x2="220" y2="130"/>
    <line x1="270" y1="70" x2="320" y2="130"/>
    <line x1="20" y1="170" x2="70" y2="230"/>
    <line x1="120" y1="170" x2="170" y2="230"/>
    <line x1="220" y1="170" x2="270" y2="230"/>
    <line x1="320" y1="170" x2="370" y2="230"/>
    <line x1="70" y1="270" x2="120" y2="330"/>
    <line x1="170" y1="270" x2="220" y2="330"/>
    <line x1="270" y1="270" x2="320" y2="330"/>
  </g>

  <!-- Central decorative medallion -->
  <g transform="translate(200,200)">
    <circle r="80" fill="none" stroke="#92400e" stroke-width="1" opacity="0.2"/>
    <circle r="60" fill="none" stroke="#92400e" stroke-width="0.8" opacity="0.15"/>
    <circle r="40" fill="none" stroke="#92400e" stroke-width="0.6" opacity="0.12"/>
    <!-- 8-pointed star -->
    <polygon points="0,-55 15,-15 55,0 15,15 0,55 -15,15 -55,0 -15,-15" fill="#92400e" opacity="0.06"/>
    <polygon points="0,-40 10,-10 40,0 10,10 0,40 -10,10 -40,0 -10,-10" fill="#92400e" opacity="0.08"/>
    <!-- Inner flower -->
    <circle r="15" fill="#059669" opacity="0.12"/>
    <circle r="8" fill="#10b981" opacity="0.15"/>
    <!-- Petals -->
    <ellipse cx="0" cy="-20" rx="6" ry="10" fill="#059669" opacity="0.08"/>
    <ellipse cx="20" cy="0" rx="10" ry="6" fill="#059669" opacity="0.08"/>
    <ellipse cx="0" cy="20" rx="6" ry="10" fill="#059669" opacity="0.08"/>
    <ellipse cx="-20" cy="0" rx="10" ry="6" fill="#059669" opacity="0.08"/>
    <ellipse cx="14" cy="-14" rx="6" ry="10" fill="#059669" opacity="0.06" transform="rotate(45 14 -14)"/>
    <ellipse cx="14" cy="14" rx="6" ry="10" fill="#059669" opacity="0.06" transform="rotate(-45 14 14)"/>
    <ellipse cx="-14" cy="14" rx="6" ry="10" fill="#059669" opacity="0.06" transform="rotate(45 -14 14)"/>
    <ellipse cx="-14" cy="-14" rx="6" ry="10" fill="#059669" opacity="0.06" transform="rotate(-45 -14 -14)"/>
  </g>

  <!-- Corner arches -->
  <g stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M0,60 Q0,0 60,0"/>
    <path d="M0,45 Q0,0 45,0"/>
    <path d="M340,0 Q400,0 400,60"/>
    <path d="M355,0 Q400,0 400,45"/>
    <path d="M0,340 Q0,400 60,400"/>
    <path d="M0,355 Q0,400 45,400"/>
    <path d="M340,400 Q400,400 400,340"/>
    <path d="M355,400 Q400,400 400,355"/>
  </g>

  <!-- Accent dots -->
  <g fill="#059669" opacity="0.2">
    <circle cx="70" cy="50" r="3"/>
    <circle cx="170" cy="50" r="3"/>
    <circle cx="270" cy="50" r="3"/>
    <circle cx="120" cy="150" r="3"/>
    <circle cx="220" cy="150" r="3"/>
    <circle cx="70" cy="250" r="3"/>
    <circle cx="170" cy="250" r="3"/>
    <circle cx="270" cy="250" r="3"/>
    <circle cx="120" cy="350" r="3"/>
    <circle cx="220" cy="350" r="3"/>
  </g>
</svg>
